<div id="statsTableModal" class="ywbmodal">
    <div class="modal-content">
        <div class="modal-body">
            <div class="form-group">
                <label for="tableName">Table Name</label>
                <input type="text" id="tableName" class="form-control" placeholder="Enter table name">
            </div>

            <div class="form-group">
                <label>Metrics (Table Columns)</label>
                <div class="btn-group">
                    <button id="selectAllMetrics" class="btn btn-sm btn-outline-secondary">Select All</button>
                    <button id="deselectAllMetrics" class="btn btn-sm btn-outline-secondary">Deselect All</button>
                </div>
                <div id="metricsColumns" class="columns-container sortable-list"></div>
            </div>

            <div class="form-group">
                <label>Dimensions (Group By)</label>
                <div class="btn-group">
                    <button id="selectAllDimensions" class="btn btn-sm btn-outline-secondary">Select All</button>
                    <button id="deselectAllDimensions" class="btn btn-sm btn-outline-secondary">Deselect All</button>
                </div>
                <div id="dimensionsColumns" class="columns-container sortable-list"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelTableBtn" onclick="$.modal.close();">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveTableBtn">Save</button>
        </div>
    </div>
</div>

<script>
    function initializeStatsTableEditor(availableColumns, selectedMetrics, selectedDimensions, tableName, saveUrl) {
        // Set table name if provided
        if (tableName) {
            document.getElementById('tableName').value = tableName;
        }

        // Convert availableColumns from array of strings to array of objects if needed
        if (Array.isArray(availableColumns) && availableColumns.length > 0 && typeof availableColumns[0] === 'string') {
            availableColumns = availableColumns.map(field => ({
                field: field,
                title: field.charAt(0).toUpperCase() + field.slice(1).replace(/_/g, ' ')
            }));
        }

        // Convert selectedMetrics from array of strings to array of objects if needed
        if (Array.isArray(selectedMetrics) && selectedMetrics.length > 0 && typeof selectedMetrics[0] === 'string') {
            selectedMetrics = selectedMetrics.map(field => ({
                field: field,
                width: -1
            }));
        }

        // Convert selectedDimensions from array of strings to array of objects if needed
        if (Array.isArray(selectedDimensions) && selectedDimensions.length > 0 && typeof selectedDimensions[0] === 'string') {
            selectedDimensions = selectedDimensions.map(field => ({
                field: field,
                width: -1
            }));
        }

        // Initialize sortable lists
        new Sortable(document.getElementById('metricsColumns'), {
            animation: 150,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen'
        });

        new Sortable(document.getElementById('dimensionsColumns'), {
            animation: 150,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen'
        });

        // Populate metrics list
        const metricsContainer = document.getElementById('metricsColumns');
        metricsContainer.innerHTML = '';
        availableColumns.forEach(column => {
            const isSelected = selectedMetrics.some(sc => sc.field === column.field);
            const item = document.createElement('li');
            item.className = 'column-item';
            item.dataset.field = column.field;
            item.innerHTML = `
                <input type="checkbox" ${isSelected ? 'checked' : ''}>
                <span>${column.title || column.field}</span>
            `;
            metricsContainer.appendChild(item);
        });

        // Populate dimensions list
        const dimensionsContainer = document.getElementById('dimensionsColumns');
        dimensionsContainer.innerHTML = '';
        availableColumns.forEach(column => {
            const isSelected = selectedDimensions.some(sd => sd.field === column.field);
            const item = document.createElement('li');
            item.className = 'column-item';
            item.dataset.field = column.field;
            item.innerHTML = `
                <input type="checkbox" ${isSelected ? 'checked' : ''}>
                <span>${column.title || column.field}</span>
            `;
            dimensionsContainer.appendChild(item);
        });

        // Select/Deselect All buttons handlers
        document.getElementById('selectAllMetrics').onclick = () => {
            metricsContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
        };

        document.getElementById('deselectAllMetrics').onclick = () => {
            metricsContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        };

        document.getElementById('selectAllDimensions').onclick = () => {
            dimensionsContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = true);
        };

        document.getElementById('deselectAllDimensions').onclick = () => {
            dimensionsContainer.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        };

        // Save button handler
        document.getElementById('saveTableBtn').onclick = async () => {
            const tableName = document.getElementById('tableName').value;
            if (!tableName) {
                alert('Please enter a table name');
                return;
            }

            const selectedMetrics = Array.from(metricsContainer.querySelectorAll('.column-item'))
                .filter(item => item.querySelector('input').checked)
                .map(item => ({
                    field: item.dataset.field,
                    width: -1
                }));

            const selectedDimensions = Array.from(dimensionsContainer.querySelectorAll('.column-item'))
                .filter(item => item.querySelector('input').checked)
                .map(item => item.dataset.field);

            try {
                const response = await fetch(saveUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name: tableName,
                        metrics: selectedMetrics,
                        dimensions: selectedDimensions
                    })
                });

                const result = await response.json();
                if (!result.error) {
                    window.location.reload();
                } else {
                    alert('Error saving table: ' + result.msg);
                }
            } catch (error) {
                alert('Error saving table: ' + error.message);
            }
        };

        // Show modal
        $('#statsTableModal').modal({
            modalClass: 'ywbmodal',
            fadeDuration: 250,
            fadeDelay: 0.80,
            showClose: false
        });
    }
</script>

<script>
    function addColumnsToList(selectedClmns, availableClmns) {
        let $list = $('#columnsList');
        $list.empty();
        // First add selected columns in their saved order
        selectedClmns.forEach(column => {
            const $item = $(`
                <li class="sortable-item">
                    <input type="checkbox" value="${column.field}" checked>
                    <span>${column.field}</span>
                </li>`);
            $list.append($item);
        });

        // Then add unselected columns
        availableClmns.forEach(column => {
            if (!selectedClmns.some(sc => sc.field === column)) {
                const $item = $(`
                    <li class="sortable-item">
                        <input type="checkbox" value="${column}">
                        <span>${column}</span>
                    </li>`);
                $list.append($item);
            }
        });
        
        let sortableList = new Sortable(document.getElementById('columnsList'), {
            animation: 150,
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen'
        });
    }

    function getSelectedColumns() {
        const selectedColumns = [];
        $('#columnsList .sortable-item').each(function () {
            const $checkbox = $(this).find('input[type="checkbox"]');
            if ($checkbox.is(':checked')) {
                selectedColumns.push($checkbox.val());
            }
        });
        return selectedColumns;
    }

    function setSaveButtonHandler(handlerUrl){
        // Save button handler
        $('#saveColumns').off('click').on('click', async function () {
            const selectedColumns = getSelectedColumns();

            // Save columns configuration
            let res = await fetch(handlerUrl, {
                method: "POST",
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    columns: selectedColumns
                })
            });

            let data = await res.json();
            if (!data.error) {
                window.location.reload();
            } else {
                alert('Error saving columns: ' + data.msg);
            }
        });
    }

    function initializeStatsTableEditor(availableColumns, selectedMetrics, selectedDimensions, tableName, saveUrl) {
        // Initialize Sortable.js for both lists
        new Sortable(document.getElementById('metricsColumns'), {
            animation: 150,
            group: 'metrics'
        });
        new Sortable(document.getElementById('dimensionsColumns'), {
            animation: 150,
            group: 'dimensions'
        });

        // Set table name if provided
        if (tableName) {
            document.getElementById('tableName').value = tableName;
        }

        // Convert availableColumns from array of strings to array of objects if needed
        if (Array.isArray(availableColumns) && availableColumns.length > 0 && typeof availableColumns[0] === 'string') {
            availableColumns = availableColumns.map(field => ({
                field: field,
                title: field.charAt(0).toUpperCase() + field.slice(1).replace(/_/g, ' ')
            }));
        }

        // Convert selectedMetrics from array of strings to array of objects if needed
        if (Array.isArray(selectedMetrics) && selectedMetrics.length > 0 && typeof selectedMetrics[0] === 'string') {
            selectedMetrics = selectedMetrics.map(field => ({
                field: field,
                width: -1
            }));
        }

        // Convert selectedDimensions from array of strings to array of objects if needed
        if (Array.isArray(selectedDimensions) && selectedDimensions.length > 0 && typeof selectedDimensions[0] === 'string') {
            selectedDimensions = selectedDimensions.map(field => ({
                field: field,
                width: -1
            }));
        }

        // Populate metrics list
        function addColumnsToMetricsList(columns) {
            const $list = $('#metricsColumns');
            $list.empty();
            
            columns.forEach(column => {
                const isSelected = selectedMetrics.some(sc => sc.field === column.field);
                const $item = $(`
                    <div class="column-item" data-field="${column.field}">
                        <input type="checkbox" ${isSelected ? 'checked' : ''}>
                        <span>${column.title || column.field}</span>
                    </div>
                `);
                $list.append($item);
            });
        }

        // Populate dimensions list
        function addColumnsToDimensionsList(columns) {
            const $list = $('#dimensionsColumns');
            $list.empty();
            
            columns.forEach(column => {
                const isSelected = selectedDimensions.some(sd => sd === column.field);
                const $item = $(`
                    <div class="column-item" data-field="${column.field}">
                        <input type="checkbox" ${isSelected ? 'checked' : ''}>
                        <span>${column.title || column.field}</span>
                    </div>
                `);
                $list.append($item);
            });
        }

        // Add columns to both lists
        addColumnsToMetricsList(availableColumns);
        addColumnsToDimensionsList(availableColumns);

        // Select/Deselect All buttons handlers
        $('#selectAllMetrics').click(() => {
            $('#metricsColumns input[type="checkbox"]').prop('checked', true);
        });

        $('#deselectAllMetrics').click(() => {
            $('#metricsColumns input[type="checkbox"]').prop('checked', false);
        });

        $('#selectAllDimensions').click(() => {
            $('#dimensionsColumns input[type="checkbox"]').prop('checked', true);
        });

        $('#deselectAllDimensions').click(() => {
            $('#dimensionsColumns input[type="checkbox"]').prop('checked', false);
        });

        // Save button handler
        $('#saveTableBtn').click(async () => {
            const tableName = $('#tableName').val();
            if (!tableName) {
                alert('Please enter a table name');
                return;
            }

            const selectedMetrics = $('#metricsColumns .column-item')
                .filter((_, item) => $(item).find('input').is(':checked'))
                .map((_, item) => ({
                    field: $(item).data('field'),
                    width: -1
                }))
                .get();

            const selectedDimensions = $('#dimensionsColumns .column-item')
                .filter((_, item) => $(item).find('input').is(':checked'))
                .map((_, item) => $(item).data('field'))
                .get();

            if (selectedMetrics.length === 0) {
                alert('Please select at least one metric');
                return;
            }

            const data = {
                name: tableName,
                columns: selectedMetrics,
                groupby: selectedDimensions
            };

            try {
                const response = await fetch(saveUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                $.modal.close();
                location.reload();
            } catch (error) {
                alert('Error saving table: ' + error.message);
            }
        });

        // Cancel button handler
        $('#cancelTableBtn').click(() => {
            $.modal.close();
        });
    }
</script>
