<!-- Stats Table Editor Modal -->
<link rel="stylesheet" href="css/modal-common.css">
<link rel="stylesheet" href="css/sortable-common.css">

<div id="statsTableModal" class="ywbmodal">
    <div class="modal-content">
        <div class="modal-body">
            <div class="form-group">
                <h5>Table Name</h5>
                <input type="text" class="form-control" id="tableName">
            </div>

            <div class="columns-flex-container">
                <div class="columns-section">
                    <h5>Columns</h5>
                    <div class="columns-container">
                        <div id="metricsColumns" class="metricsColumns"></div>
                    </div>
                    <div class="btn-group">
                        <button id="selectAllMetrics" class="btn btn-sm btn-outline-secondary">Select All</button>
                        <button id="deselectAllMetrics" class="btn btn-sm btn-outline-secondary">Deselect All</button>
                    </div>
                </div>

                <div class="columns-section">
                    <h5>GroupBy (max 3)</h5>
                    <div class="columns-container">
                        <div id="dimensionsColumns" class="dimensionsColumns"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelTableBtn">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveTableBtn">Save</button>
        </div>
    </div>
</div>

<script src="js/sortable-common.js"></script>
<script src="js/statstableeditor.js"></script>
