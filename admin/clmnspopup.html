<!-- Columns Selection Modal -->
<link rel="stylesheet" href="css/modal-common.css">
<link rel="stylesheet" href="css/sortable-common.css">

<div id="columnModal" class="ywbmodal">
    <div class="modal-content">
        <div class="modal-header">
            <h5>Select and Order Columns</h5>
        </div>
        <div class="modal-body">
            <div class="btn-group">
                <button id="selectAllColumns" class="btn btn-sm btn-outline-secondary">Select All</button>
                <button id="deselectAllColumns" class="btn btn-sm btn-outline-secondary">Deselect All</button>
            </div>
            <div id="columnsContainer" class="columns-container">
                <div id="columnsList" class="sortable-list"></div>
            </div>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="closeModal">Cancel</button>
            <button type="button" class="btn btn-primary" id="saveColumns">Save</button>
        </div>
    </div>
</div>

<script src="js/sortable-common.js"></script>
<script src="js/clmnspopup.js"></script>
