<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oferta Especial Exclusiva</title>
    <style>
        :root {
            --accent: #10b981;
            --primary: #4f46e5;
            --dark: #0f172a;
            --text-light: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: radial-gradient(circle at top, #1e1b4b 0%, #0f0a1c 100%);
            color: #cbd5e1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(30, 27, 75, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .badge {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            color: var(--accent);
            padding: 6px 16px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-block;
            margin-bottom: 20px;
        }
        h1 {
            color: var(--text-light);
            font-size: 32px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #94a3b8;
        }
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 32px;
            background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            text-decoration: none;
        }
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(79, 70, 229, 0.6);
        }
        .tracker {
            margin-top: 30px;
            font-size: 11px;
            font-family: monospace;
            color: #475569;
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="badge">Acesso Liberado</span>
        <h1>Seja Bem-vindo ao Nosso Treinamento Exclusivo</h1>
        <p>
            Parabéns! Sua conexão foi qualificada com sucesso. Clique no botão abaixo para concluir sua inscrição e garantir o bônus promocional limitado de lançamento.
        </p>

        <a href="https://pay.kiwify.com.br/mockout?clickid={CLICKID}" class="cta-btn" id="cta-link">
            Quero Garantir Minha Vaga Agora
        </a>

        <div class="tracker">
            ID de Rastreio (clickid): <span style="color: #64748b;" id="click-id-val">{CLICKID}</span>
        </div>
    </div>

    <script>
        // Inline behavior demonstration: when user clicks CTA, mock sending a S2S purchase event
        document.getElementById('cta-link').addEventListener('click', function(e) {
            console.log('Clique de conversão capturado para o clickid:', '{CLICKID}');
        });
    </script>
</body>
</html>
